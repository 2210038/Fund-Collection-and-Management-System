<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donation Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVIGATION BAR -->
<nav class="navbar">
    <a href="campaigns.html" class="logo">FundHub</a>
    
    <ul class="navbar-nav">
        <li><a href="campaigns.html">Campaigns</a></li>
        <li><a href="donation-form.html" class="active">Donate</a></li>
    </ul>
    
    <div class="navbar-auth">
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="#" onclick="logout()" class="btn-logout" style="display:none;" id="logoutBtn">Logout</a>
    </div>
</nav>

<div class="form-container">

    <h1>Donate with bKash</h1>

    <div class="bkash-box">
        <h3>bKash Number</h3>
        <p>01712345678</p>
    </div>

    <form id="donationForm">

        <label>Campaign Name</label>
        <select id="campaignName" required>
            <option value="">Select a campaign...</option>
            <option value="gaza">Gaza Emergency Appeal</option>
            <option value="flood">Flood Relief Fund</option>
            <option value="education">Education Support Fund</option>
            <option value="medical">Medical Support Fund</option>
        </select>

        <label>Full Name</label>
        <input type="text" id="donorName" required>

        <label>Phone Number</label>
        <input type="tel" id="phone" required>

        <label>Donation Amount</label>
        <input type="number" id="donationAmount" required>

        <label>bKash Number</label>
        <input type="text" id="bkashNumber" required>

        <label>Transaction ID</label>
        <input type="text" id="transactionId" required>

        <button type="submit">Submit Donation</button>

    </form>

</div>

<script src="app.js"></script>

</body>
</html>
